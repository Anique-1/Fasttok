name: Build Wheels & Publish to PyPI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]   # triggers PyPI upload only on GitHub releases

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. BUILD WHEELS (Windows, Linux, macOS) via cibuildwheel
  # ─────────────────────────────────────────────────────────
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir dist
        env:
          # Build for Python 3.8 - 3.12
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          # Skip 32-bit builds and PyPy
          CIBW_SKIP: "*-win32 *-manylinux_i686 pp*"
          # Install pybind11 in the build environment
          CIBW_BEFORE_BUILD: "pip install pybind11"
          # C++ flags for each platform
          CIBW_ENVIRONMENT_WINDOWS: >
            CFLAGS="/O2 /std:c++17"
          CIBW_ENVIRONMENT_LINUX: >
            CFLAGS="-O3 -std=c++17"
          CIBW_ENVIRONMENT_MACOS: >
            CFLAGS="-O3 -std=c++17"
          # Run tests after each wheel build
          CIBW_TEST_REQUIRES: "pytest tiktoken"
          CIBW_TEST_COMMAND: "pytest {project}/tests/test_fasttok.py -v"

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  # ─────────────────────────────────────────────────────────
  # 2. BUILD SOURCE DISTRIBUTION
  # ─────────────────────────────────────────────────────────
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist --outdir dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ─────────────────────────────────────────────────────────
  # 3. PUBLISH TO PyPI (only when a GitHub Release is created)
  # ─────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Only publish on tagged releases
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: pypi
      url: https://pypi.org/project/fasttok/

    permissions:
      id-token: write   # required for PyPI Trusted Publishing

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI (Trusted Publishing - no token needed!)
        uses: pypa/gh-action-pypi-publish@release/v1
